<script type="text/javascript">
    RED.nodes.registerType("Text Input", {
        category: "Input",
        color: "#F0A30A",
        defaults: {
            name: { value: "" },
            text: { value: "" }
        },
        inputs: 0,
        outputs: 1,
        icon: "font-awesome/fa-pencil",
        label: function () { return this.name || "Text Input"; }
    });
</script>
<script type="text/html" data-template-name="Text Input">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-text"><i class="fa fa-pencil"></i> Text</label>
        <textarea id="node-input-text" rows="6" style="width:70%;"></textarea>
    </div>
</script>
<script type="text/html" data-help-name="Text Input">
    <p>Injects a text string into the flow as msg.payload.</p>
</script>
