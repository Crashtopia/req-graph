<script type="text/javascript">

    function registerAgentTemplate(name, helpText) {
        $("body").append(`
            <script type="text/html" data-template-name="${name}">
                <div class="form-row">
                    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
                    <input type="text" id="node-input-name">
                </div>
                <div class="form-row">
                    <label for="node-input-seedingPrompt"><i class="fa fa-comment"></i> Seeding <br> Prompt</label>
                    <textarea id="node-input-seedingPrompt" rows="4" style="width:70%;"></textarea>
                </div>
                <div class="form-row">
                    <label for="node-input-model"><i class="fa fa-cube"></i> Model</label>
                    <select id="node-input-model" style="width:70%;"></select>
                </div>
            <\/script>
            <script type="text/html" data-help-name="${name}">
                <p>${helpText}</p>
            <\/script>
        `);
    }

    function registerAgentNode(name, defaultPrompt) {
        RED.nodes.registerType(name, {
            category: "Role Agents",
            color: "#10C8EB",
            defaults: {
                name: { value: "" },
                seedingPrompt: { value: defaultPrompt },
                model: { value: "" }
            },
            inputs: 1,
            outputs: 1,
            icon: "font-awesome/fa-user",
            label: function () { return this.name || name; },
            oneditprepare: function() {
                var select = $("#node-input-model");
                var currentValue = this.model;
                availableModels.forEach(function(model) {
                    select.append($("<option>", { value: model, text: model }));
                });
                select.val(currentValue);
            }
        });
    }

    const agents = [
        {
            name: "Custom Agent",
            prompt: "",
            help: "A custom agent node."
        },
        {
            name: "Software Architect",
            prompt: "Given an input text, adjust it to the needs of a Software Architect.",
            help: "A node representing a Software Architect agent."
        },
        {
            name: "Product Owner",
            prompt: "Given an input text, adjust it to the needs of a Product Manager.",
            help: "A node representing a Product Owner agent."
        },
        {
            name: "Requirements Engineer",
            prompt: "Given an input text, adjust it to the needs of a Requirements Engineer.",
            help: "A node representing a Requirements Engineer agent."
        },
        {
            name: "Software Developer",
            prompt: "Given an input text, adjust it to the needs of a Software Developer.",
            help: "A node representing a Software Developer agent."
        },
        {
            name: "Software Tester",
            prompt: "Given an input text, adjust it to the needs of a Software Tester.",
            help: "A node representing a Software Tester agent."
        }
    ];

    agents.forEach(function(agent) {registerAgentNode(agent.name, agent.prompt);
        registerAgentTemplate(agent.name, agent.help);
        
    });

</script>
