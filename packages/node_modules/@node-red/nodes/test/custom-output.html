<script type="text/javascript">
    RED.nodes.registerType("Custom Output", {
        category: "Outputs",
        color: "#85FF8D",
        defaults: {
            name: { value: ""},
            text: {
                value: "Create an awesome output!"
            }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-sign-out",
        label: function () { return this.name || "Custom Output"; }
    });
</script>

<script type="text/html" data-template-name="Custom Output">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-text"><i class="fa fa-pencil"></i>Output <br>Description</label>
        <textarea id="node-input-text" rows="6" style="width:70%;"></textarea>
    </div>

    <div class="form-row">
    <label for="node-input-model"><i class="fa fa-cube"></i> Model</label>
    <select id="node-input-model" style="width:70%;"></select>
    </div>
</script>

<script type="text/html" data-help-name="Custom Output">
    <p>A node for creating custom outputs.</p>
</script>
