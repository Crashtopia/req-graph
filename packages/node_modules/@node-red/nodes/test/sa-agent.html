<script type="text/javascript">
    RED.nodes.registerType("Software Architect", {
        category: "Role Agents",
        color: "#10C8EB",
        defaults: {
            name: { value: "" },
            seedingPrompt: {
                value: "Given an input text, " +
                    "adjust it to the needs of a " +
                    "Software Architect."
            }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-user",
        label: function () { return this.name || "Software Architect"; }
    });
</script>

    <div class="form-row">
    <label for="node-input-seedingPrompt"><i class="fa fa-comment"></i> Seeding <br> Prompt</label>
    <textarea id="node-input-seedingPrompt" rows="4" style="width:70%;"></textarea>
    </div>

    <div class="form-row">

    </div>
</script>

    <p>A node representing a Software Architect agent.</p>
